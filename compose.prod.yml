# Production compose for Exchange Diary.
# All services share Tailscale's network namespace and communicate on 127.0.0.1.
# The tailscale_state volume persists the node identity across restarts.
#
# Server image is pulled from GHCR; no local Go toolchain required.
# To pin a specific version, replace :latest with :v1.2.3 or :sha-abc1234.
# Bundled deploys (ops/bundle.sh) also use this file; bundle.sh rewrites
# the postgres initdb mount to load the full pg_dump instead of just schema.sql.

name: diary-prod

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./tailscale_state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
      - /dev/net/tun:/dev/net/tun

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      - tailscale
    environment:
      - POSTGRES_DB=diary
      - POSTGRES_USER=diary
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_INITDB_ARGS=--locale=C.UTF-8 --encoding=UTF8
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Bundled deploys inject the full DB dump as an initdb mount here
      # (see ops/bundle.sh); fresh deploys start with an empty DB and
      # let the server run migrations on first boot.
    network_mode: "service:tailscale"

  server:
    image: ${SERVER_IMAGE:-ghcr.io/nananek/nekomisu-diary-server:latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - postgres
      - tailscale
    command:
      - -pg=postgres://diary:${PG_PASSWORD}@127.0.0.1:5432/diary?sslmode=disable
      - -addr=:3000
      - -uploads=/app/uploads
      - -web=/app/web/dist
      - -rp-id=${RP_ID}
      - -rp-origin=${RP_ORIGIN}
      - -discord-webhook=${DISCORD_WEBHOOK:-}
    volumes:
      - ./uploads:/app/uploads
    network_mode: "service:tailscale"

volumes:
  pg-data:
