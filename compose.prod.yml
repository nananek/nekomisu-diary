# Production compose for Exchange Diary
# Reuses the original WordPress Tailscale state → wordpress.tail2c8c7.ts.net
# All services share Tailscale's network namespace, communicate on 127.0.0.1.

name: diary-prod

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - /home/kts_sz/wp/mnt/docker/wordpress/tailscale_state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
      - /dev/net/tun:/dev/net/tun

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      - tailscale
    environment:
      - POSTGRES_DB=diary
      - POSTGRES_USER=diary
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_INITDB_ARGS=--locale=C.UTF-8 --encoding=UTF8
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./tools/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
    network_mode: "service:tailscale"

  server:
    image: alpine:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - tailscale
    entrypoint: ["/app/bin/server"]
    command:
      - -pg=postgres://diary:${PG_PASSWORD}@127.0.0.1:5432/diary?sslmode=disable
      - -addr=:3000
      - -uploads=/app/uploads
      - -web=/app/web/dist
      - -rp-id=${RP_ID}
      - -rp-origin=${RP_ORIGIN}
    volumes:
      - ./bin/server:/app/bin/server:ro
      - ./web/dist:/app/web/dist:ro
      - ./uploads:/app/uploads
    network_mode: "service:tailscale"

volumes:
  pg-data:
