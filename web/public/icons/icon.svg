<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#7c5cbf"/>
  <g transform="translate(256,256)">
    <!-- Book/diary icon -->
    <rect x="-120" y="-140" width="240" height="280" rx="16" fill="#fff" opacity="0.95"/>
    <rect x="-100" y="-140" width="8" height="280" fill="#7c5cbf" opacity="0.3"/>
    <!-- Lines (diary text) -->
    <line x1="-70" y1="-80" x2="90" y2="-80" stroke="#7c5cbf" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <line x1="-70" y1="-40" x2="90" y2="-40" stroke="#7c5cbf" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <line x1="-70" y1="0" x2="60" y2="0" stroke="#7c5cbf" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <line x1="-70" y1="40" x2="90" y2="40" stroke="#7c5cbf" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <line x1="-70" y1="80" x2="40" y2="80" stroke="#7c5cbf" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <!-- Pen -->
    <g transform="translate(80,90) rotate(-45)">
      <rect x="-6" y="-60" width="12" height="50" rx="2" fill="#e8a840"/>
      <polygon points="-6,-10 6,-10 0,8" fill="#333"/>
    </g>
  </g>
</svg>
