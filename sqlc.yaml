version: "2"
sql:
  - engine: postgresql
    schema: internal/migrate/migrations
    queries: internal/dbq/queries
    gen:
      go:
        package: dbq
        out: internal/dbq
        sql_package: database/sql
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        overrides:
          # post_visibility ENUM → keep as string
          - db_type: "post_visibility"
            go_type: "string"
